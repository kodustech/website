server {
    listen 80;
    listen [::]:80;
    server_name kodus.io www.kodus.io;

    root /home/ezdevs/kodus-files;
    index index.php index.html;

    client_max_body_size 64M;

    # WP permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP via FastCGI (PHP 8.3-fpm)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120;
    }

    # Bloqueia acesso a .ht*, .git, etc — exceto .well-known (Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Cache de imagens/fontes
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # CSS/JS: revalidate (sem cache longo)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    # Robots e favicon
    location = /robots.txt { allow all; log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }

    access_log /var/log/nginx/kodus.io.access.log;
    error_log  /var/log/nginx/kodus.io.error.log;
}
